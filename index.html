<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Leave Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NSW Leave Calculator</h1>
    </header>

    <div class="dashboard-hero">
        <p>Annual Leave Balance</p>
        <div class="balance-large"><span id="resAnnual">0.00</span> <small>hrs</small></div>
        <p>Long Service Leave: <span id="resLSL">0.000</span> weeks</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Hire Date</label>
            <input type="date" id="hireDate" onchange="calculateLeave()">
        </div>

        <div class="input-group">
            <label>Weekly Hours</label>
            <input type="number" id="weeklyHours" value="38" onchange="calculateLeave()">
        </div>

        <div class="input-group">
            <label>Calculation Mode</label>
            <select id="calcMode" onchange="toggleMode()">
                <option value="startDate">From Hire Date</option>
                <option value="knownBalance">From Manual Balance</option>
            </select>
        </div>

        <div id="balanceSection" style="display:none;">
            <label>Current Balance (hrs)</label>
            <input type="number" id="startBalance" onchange="calculateLeave()">
            <label>As of Date</label>
            <input type="date" id="balanceDate" onchange="calculateLeave()">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Resignation Payout</div>
        <label>Hourly Rate ($)</label>
        <input type="number" id="hourlyRate" onchange="calculateResignation()">
        <label>Exit Date</label>
        <input type="date" id="resigDate" onchange="calculateResignation()">
        <div id="resignationResults"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
